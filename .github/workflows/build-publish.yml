name: Build and Publish Docker Images

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Version tag to release (e.g., v2.0.0). Promotes the current main image. Leave empty to just build."
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  OWNER: scottfridwin

jobs:
  # ----------------------------------------------------------
  # Test: Run Python unit tests for all sidecars
  # ----------------------------------------------------------
  test:
    name: Test ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service: [lidarr-sidecar, radarr-sidecar, sonarr-sidecar]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install test dependencies
        run: |
          pip install --quiet requests mutagen

      - name: Run shared Python tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python3 -m unittest discover -s shared/python/tests -p 'test_*.py' -v

      - name: Run service-specific tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          if find "${{ matrix.service }}" -path '*/test*' -name 'test_*.py' 2>/dev/null | grep -q .; then
            echo "Running tests for ${{ matrix.service }}"
            find "${{ matrix.service }}" -path '*/test*' -name 'test_*.py' -exec dirname {} \; | sort -u | while read dir; do
              python3 -m unittest discover -s "$dir" -p 'test_*.py' -v
            done
          else
            echo "No service-specific tests found for ${{ matrix.service }}, skipping."
          fi

      - name: Verify Python files compile
        run: |
          find "${{ matrix.service }}" -name '*.py' -exec python3 -c "
          import ast, sys
          for f in sys.argv[1:]:
              try:
                  ast.parse(open(f).read())
              except SyntaxError as e:
                  print(f'FAIL: {f}: {e}')
                  sys.exit(1)
          print(f'All {len(sys.argv)-1} files compile OK')
          " {} +

  # ----------------------------------------------------------
  # Build: Build and push Docker images
  # ----------------------------------------------------------
  build:
    name: Build ${{ matrix.service }}
    needs: test
    runs-on: ubuntu-latest
    # Runs on push to main OR manual dispatch with build_branch=true
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag == '')
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        service: [lidarr-sidecar, radarr-sidecar, sonarr-sidecar]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Compute image tags
        id: tags
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.service }}"
          SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
          TAGS="${IMAGE}:sha-${SHORT_SHA}"

          # Main branch: also tag as "main"
          if [[ "$GITHUB_REF" == "refs/heads/main" ]]; then
            TAGS="${TAGS},${IMAGE}:main"
          fi

          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "Generated tags: ${TAGS}"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU (for multi-arch)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.service }}/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # ----------------------------------------------------------
  # Release: Promote existing main image with version tags
  # Triggered via workflow_dispatch with a version tag input.
  # This re-tags the multi-arch manifest — no rebuild needed.
  # ----------------------------------------------------------
  release:
    name: Release ${{ matrix.service }} as ${{ github.event.inputs.release_tag }}
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    strategy:
      fail-fast: false
      matrix:
        service: [lidarr-sidecar, radarr-sidecar, sonarr-sidecar]

    steps:
      - name: Verify main branch
        run: |
          if [[ "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "::error::Release can only be triggered from the main branch (got $GITHUB_REF)"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Install crane
        uses: imjasonh/setup-crane@v0.6

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | crane auth login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Promote image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.service }}"
          VERSION_TAG="${{ github.event.inputs.release_tag }}"
          VERSION_NO_V="${VERSION_TAG#v}"

          echo "Promoting ${IMAGE}:main → ${VERSION_TAG}, ${VERSION_NO_V}, latest"

          crane copy "${IMAGE}:main" "${IMAGE}:${VERSION_TAG}"
          crane copy "${IMAGE}:main" "${IMAGE}:${VERSION_NO_V}"
          crane copy "${IMAGE}:main" "${IMAGE}:latest"

      - name: Create git tag
        run: |
          VERSION_TAG="${{ github.event.inputs.release_tag }}"
          git tag "$VERSION_TAG" || true
          git push origin "$VERSION_TAG" || true

  # ----------------------------------------------------------
  # Release notes: Create GitHub Release after promotion
  # ----------------------------------------------------------
  release-notes:
    name: Create GitHub Release
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Generate release notes
        run: |
          VERSION_TAG="${{ github.event.inputs.release_tag }}"
          PREV_TAG=$(git tag --sort=-version:refname | grep '^v' | grep -v "^${VERSION_TAG}$" | head -1)
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log --pretty=format:"- %s (%h)" "${PREV_TAG}..HEAD" | head -50)
          else
            NOTES="Initial release"
          fi
          echo "$NOTES" > /tmp/release-notes.md
          echo "" >> /tmp/release-notes.md
          echo "## Docker Images" >> /tmp/release-notes.md
          echo "" >> /tmp/release-notes.md
          echo '```' >> /tmp/release-notes.md
          echo "docker pull ${{ env.REGISTRY }}/${{ env.OWNER }}/lidarr-sidecar:${VERSION_TAG}" >> /tmp/release-notes.md
          echo "docker pull ${{ env.REGISTRY }}/${{ env.OWNER }}/radarr-sidecar:${VERSION_TAG}" >> /tmp/release-notes.md
          echo "docker pull ${{ env.REGISTRY }}/${{ env.OWNER }}/sonarr-sidecar:${VERSION_TAG}" >> /tmp/release-notes.md
          echo '```' >> /tmp/release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          body_path: /tmp/release-notes.md
          generate_release_notes: false
